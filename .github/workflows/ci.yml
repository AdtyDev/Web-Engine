name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r website-engine/backend/requirements.txt
      - name: Run backend tests
        run: |
          python -m pytest website-engine/backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - name: Install frontend dependencies
        run: |
          corepack enable pnpm
          pnpm install --frozen-lockfile
      - name: Build frontend
        run: |
          pnpm --filter website-engine/frontend run build
