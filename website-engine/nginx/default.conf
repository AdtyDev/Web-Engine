# VPS nginx config.
# Same-origin deployment: /api proxied to the matching backend container.
# runtime-config.js stays empty (API_URL=""), so zero CORS config is needed.
# Add one server{} block per client domain.

server {
    listen 80;
    server_name sunriseclinic.example.com;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — /api → clinic backend container
    location /api/ {
        proxy_pass http://backend-clinic:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — any path that isn't a file goes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

