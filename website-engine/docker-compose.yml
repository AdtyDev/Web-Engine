version: "3.9"

# VPS path — one backend container per client, one shared nginx frontend.
# New client = add a backend service block + an nginx server block + DNS A record.

services:

  # --- Clinic backend ---
  backend-clinic:
    build: ./backend
    environment:
      - CLIENT_ID=clinic
      - CONFIG_DIR=./configs
      - ALLOWED_ORIGINS_RAW=https://sunriseclinic.example.com
      - ENV=prod
      # SMTP_* from .env or Docker secrets
    volumes:
      - ./backend/configs:/app/configs:ro
    restart: unless-stopped

  # --- Add more clients here, e.g. ---
  # backend-restaurant:
  #   build: ./backend
  #   environment:
  #     - CLIENT_ID=restaurant
  #     - ALLOWED_ORIGINS_RAW=https://tandoorandtales.example.com
  #     - ENV=prod
  #   volumes:
  #     - ./backend/configs:/app/configs:ro
  #   restart: unless-stopped

  # --- Shared nginx frontend ---
  frontend:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro  # pre-built Vite output
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - backend-clinic
