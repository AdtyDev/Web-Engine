kind = "web"
previewPath = "/"
title = "Website Engine"
version = "1.0.0"
id = "artifacts/website-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24822

[services.development]
run = "pnpm --filter @workspace/website-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/website-engine", "run", "build" ]
publicDir = "artifacts/website-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24822"
BASE_PATH = "/"
